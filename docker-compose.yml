services:
  esp32-bridge:
    image: ghcr.io/dzarlax/esp32-bridge:latest
    container_name: esp32-bridge
    restart: unless-stopped
    env_file: .env
    environment:
      LISTEN_ADDR: ":8090"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.esp32-bridge.entrypoints=https"
      - "traefik.http.routers.esp32-bridge.rule=Host(`esp32-bridge.dzarlax.dev`)"
      - "traefik.http.routers.esp32-bridge.tls=true"
      - "traefik.http.routers.esp32-bridge.tls.certresolver=letsEncrypt"
      - "traefik.http.services.esp32-bridge.loadbalancer.server.port=8090"
      - "traefik.docker.network=traefik"
    networks:
      - traefik

networks:
  traefik:
    external: true
